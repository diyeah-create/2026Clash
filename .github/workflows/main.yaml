name: Fetch & Strict Google + Download Speed Test (Ultimate)

on:
  schedule:
    - cron: "0 */5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Config Git
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"

      - name: Install Python dependencies
        run: pip install pyyaml requests

      - name: Download raw proxies & stars（多订阅全格式）
        env:
          PROXIES_URLS: ${{ secrets.PROXIES_URLS }}
        run: |
          timeout 10 curl -f "https://api.star-history.com/svg?repos=cxddgtb/2026Clash&type=Date" > stars.svg || true
          python3 fetch_proxies.py

      - name: Deduplicate + 防重名
        run: python3 dedup.py

      - name: Cache clash-speedtest binary（只下载一次）
        uses: actions/cache@v4
        with:
          path: clash-speedtest
          key: clash-speedtest-linux-x86_64-latest

      - name: Strict Clash Speed Test（极致高并发20 + 双阶段 + <5000ms 严格低延迟）
        timeout-minutes: 360   # 防止整个 step 超时
        run: |
          # 使用缓存加速
          if [ ! -f clash-speedtest ]; then
            echo "首次下载 clash-speedtest..."
            curl -sL https://github.com/faceair/clash-speedtest/releases/latest/download/clash-speedtest_Linux_x86_64.tar.gz | tar xz
            chmod +x clash-speedtest
          else
            echo "✅ 使用缓存二进制（秒启动）"
          fi

          echo "=== 第一阶段：fast 模式（全节点只测延迟 · 高并发20）==="
          ./clash-speedtest \
            -c proxies_dedup.yaml \
            -output proxies_tested.yaml \
            -rename \
            -speed-mode fast \
            -server-url "https://dl.google.com/chrome/mac/universal/stable/GGRO/googlechrome.dmg" \
            -max-latency 15000ms \
            -max-packet-loss 60 \
            -timeout 4s \
            -concurrent 20 || echo "第一阶段失败，使用去重文件"

          # 严格 <5000ms 过滤
          python3 filter_low_latency.py || echo "过滤异常，使用全部节点"

          echo "=== 第二阶段：download 模式（仅对 <5000ms 节点测下载速度）==="
          ./clash-speedtest \
            -c low_latency.yaml \
            -output proxies_tested.yaml \
            -rename \
            -speed-mode download \
            -server-url "https://dl.google.com/chrome/mac/universal/stable/GGRO/googlechrome.dmg" \
            -min-download-speed 0.3 \
            -max-packet-loss 40 \
            -timeout 6s \
            -concurrent 12 || echo "第二阶段失败，使用第一阶段结果"

          # 最终判断
          if [ -f proxies_tested.yaml ] && [ "$(grep -c "server:" proxies_tested.yaml 2>/dev/null || echo 0)" -gt 10 ]; then
            cp proxies_tested.yaml proxies.yaml
            echo "✅ 高并发测速完成！保留全部优质节点（<5000ms + 下载合格）"
          else
            cp proxies_dedup.yaml proxies.yaml
            echo "⚠️ 测速后优质节点不足，使用去重文件"
          fi

      - name: Enhance Node Names（添加延迟显示）
        run: python3 enhance_names.py

      - name: Generate Node Statistics
        run: python3 generate_stats.py

      - name: Build Full Config（超级策略 + 色情规则）
        run: python3 build_full_config.py

      - name: Commit changes
        run: |
          git add proxies.yaml clash.yaml nodes_stats.md stars.svg raw_proxies.yaml proxies_dedup.yaml || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🚀 Ultimate Update: 多订阅全格式 + 超级策略组 + 色情专用规则 + 节点增强 ($(date '+%Y-%m-%d %H:%M:%S'))"
            git push
          fi
