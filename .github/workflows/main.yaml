name: Fetch & Strict Google + Download Speed Test (Ultimate)

on:
  schedule:
    - cron: "0 */5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Config Git
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"

      - name: Install Python dependencies
        run: pip install pyyaml requests

      - name: Download raw proxies & stars（多订阅全格式）
        env:
          PROXIES_URLS: ${{ secrets.PROXIES_URLS }}
        run: |
          timeout 10 curl -f "https://api.star-history.com/svg?repos=cxddgtb/2026Clash&type=Date" > stars.svg || true
          python3 fetch_proxies.py

      - name: Deduplicate + 防重名
        run: python3 dedup.py

      - name: Speed Test（xiecang 缓存版 · 极致快 + 保留全部节点）
        run: |
          # 下载最新 xiecang/speedtest-clash（Linux x86_64）
          curl -L -o speedtest-clash https://github.com/xiecang/speedtest-clash/releases/latest/download/speedtest-clash_Linux_x86_64
          chmod +x speedtest-clash

          echo "=== 使用 xiecang 缓存版测速（保留全部节点 + 智能缓存）==="
          ./speedtest-clash \
            -c proxies_dedup.yaml \
            -output proxies_tested.yaml \
            -concurrent 15 \          # 高并发（GitHub runner 极限）
            -timeout 6s \             # 超时更短
            -sort t \                 # 按延迟排序（t = latency）
            -size 50 \                # 下载大小 50MB（比默认 100MB 更快）
            || echo "⚠️ 测速异常，使用去重文件"

          # 最终判断（兼容你的后续流程）
          if [ -f proxies_tested.yaml ] && [ "$(grep -c "server:" proxies_tested.yaml 2>/dev/null || echo 0)" -gt 10 ]; then
            cp proxies_tested.yaml proxies.yaml
            echo "✅ xiecang 测速完成！保留全部优质节点（缓存加速）"
          else
            cp proxies_dedup.yaml proxies.yaml
            echo "⚠️ 测速后节点不足，使用去重文件"
          fi

      - name: Enhance Node Names（添加延迟显示）
        run: python3 enhance_names.py

      - name: Generate Node Statistics
        run: python3 generate_stats.py

      - name: Build Full Config（超级策略 + 色情规则）
        run: python3 build_full_config.py

      - name: Commit changes
        run: |
          git add proxies.yaml clash.yaml nodes_stats.md stars.svg raw_proxies.yaml proxies_dedup.yaml || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🚀 Ultimate Update: 多订阅全格式 + 超级策略组 + 色情专用规则 + 节点增强 ($(date '+%Y-%m-%d %H:%M:%S'))"
            git push
          fi
