name: Fetch & Strict Speed Test

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Config Git
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"

      - name: Download raw proxies & stars
        env:
          PROXIES_URL: ${{ secrets.PROXIES_URL }}
        run: |
          timeout 10 curl -f "https://api.star-history.com/svg?repos=cxddgtb/2026Clash&type=Date" > stars.svg || true
          curl -f -L "$PROXIES_URL" -o raw_proxies.yaml || { echo "Failed to fetch proxies"; exit 1; }

      - name: Deduplicate + 过滤垃圾节点
        run: python3 dedup.py   # 假设 dedup.py 在根目录

      - name: Clash Speed Test
        run: |
          curl -sL https://github.com/faceair/clash-speedtest/releases/latest/download/clash-speedtest_Linux_x86_64.tar.gz | tar xz
          chmod +x clash-speedtest
          ./clash-speedtest -c proxies_dedup.yaml --test-url "http://www.gstatic.com/generate_204" --speed-mode download --timeout 10000 --concurrent 4 --max-latency 800 --rename --output proxies_tested.yaml || echo "测速异常，使用去重文件"
          if [ -f proxies_tested.yaml ] && grep -q "proxies:" proxies_tested.yaml; then
            cp proxies_tested.yaml proxies.yaml
          else
            cp proxies_dedup.yaml proxies.yaml
          fi

      - name: Commit changes
        run: |
          git add proxies.yaml stars.svg raw_proxies.yaml proxies_dedup.yaml || true
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Update: dedup + speed test ($(date '+%Y-%m-%d %H:%M'))"
            git push
          fi
