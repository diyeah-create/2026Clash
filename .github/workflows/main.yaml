name: Fetch & Strict Google + Download Speed Test

on:
  schedule:
    - cron: "0 */5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Config Git
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"

      - name: Install Python dependencies
        run: pip install pyyaml requests

      - name: Download raw proxies & stars（支持多订阅 + 全格式）
        env:
          PROXIES_URLS: ${{ secrets.PROXIES_URLS }}
        run: |
          # 下载星星图
          timeout 10 curl -f "https://api.star-history.com/svg?repos=cxddgtb/2026Clash&type=Date" > stars.svg || true
          
          # 调用独立 Python 脚本处理多订阅
          python3 fetch_proxies.py

      - name: Deduplicate + 过滤垃圾节点
        run: python3 dedup.py

      - name: Strict Clash Speed Test
        run: |
          curl -sL https://github.com/faceair/clash-speedtest/releases/latest/download/clash-speedtest_Linux_x86_64.tar.gz | tar xz
          chmod +x clash-speedtest
          echo "开始严格测速..."
          ./clash-speedtest \
            -c proxies_dedup.yaml \
            -output proxies_tested.yaml \
            -rename \
            -speed-mode download \
            -server-url "https://dl.google.com/chrome/mac/universal/stable/GGRO/googlechrome.dmg" \
            -max-latency 5000ms \
            -min-download-speed 1 \
            -max-packet-loss 10 \
            -timeout 10s \
            -concurrent 12 || echo "测速异常，使用去重文件"
          
          if [ -f proxies_tested.yaml ] && [ "$(grep -c "server:" proxies_tested.yaml 2>/dev/null || echo 0)" -gt 0 ]; then
            cp proxies_tested.yaml proxies.yaml
          else
            cp proxies_dedup.yaml proxies.yaml
          fi

      - name: Generate Node Statistics
        run: python3 generate_stats.py

      - name: Build Full Config with Latest Rules
        run: python3 build_full_config.py

      - name: Commit changes
        run: |
          git add proxies.yaml nodes_stats.md stars.svg raw_proxies.yaml proxies_dedup.yaml || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update: 多订阅全格式支持 + 严格测速 + 规则集 ($(date '+%Y-%m-%d %H:%M:%S'))"
            git push
          fi
